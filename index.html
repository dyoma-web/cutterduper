<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CutterDuper</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- LOADING -->
  <div id="cd-loading" class="cd-loading">
    <div class="cd-loading-spinner"></div>
    <p>Cargando CutterDuper...</p>
  </div>

  <!-- APP -->
  <div id="cd-app" class="cd-app" style="display: none;">

    <header class="cd-header">
      <div class="cd-header__brand">
        <a href="?" class="cd-header__home" title="Volver al inicio">
          <h1 class="cd-header__logo">CutterDuper</h1>
        </a>
        <span class="cd-header__badge">Preview</span>
      </div>
      <div class="cd-header__project">
        <h2 id="cd-project-title"></h2>
        <p id="cd-project-desc"></p>
      </div>
      <div class="cd-header__actions">
        <button id="cd-share-btn" class="cd-btn cd-btn--primary cd-btn--preview" title="Compartir link de visualizacion">
          <span class="cd-preview-icon">&#128279;</span> Compartir
        </button>
        <button id="cd-preview-btn" class="cd-btn cd-btn--secondary cd-btn--preview" style="display:none" title="Ver como visualizador">
          <span class="cd-preview-icon">&#128065;</span> Vista previa
        </button>
        <div class="cd-header__disclaimer" id="cd-disclaimer"></div>
      </div>
    </header>

    <main class="cd-main">

      <!-- Player + Info side by side -->
      <div class="cd-main__top">
        <div class="cd-player-wrapper">
          <div id="cd-player"></div>
        </div>
        <div class="cd-main__seginfo">
          <div id="cd-seginfo-container"></div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="cd-main__timeline">
        <div id="cd-timeline-container"></div>
      </div>

      <!-- Editor (only in edit mode) -->
      <div class="cd-main__editor">
        <div id="cd-editor-container"></div>
      </div>

      <!-- Comments (right column) -->
      <div class="cd-main__comments-area">
        <div id="cd-comments-container"></div>
      </div>

    </main>

    <footer class="cd-footer">
      <p>CutterDuper &mdash; Previsualizacion de edicion. No es un render final.</p>
    </footer>

  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/player.js"></script>
  <script src="js/timeline-ui.js"></script>
  <script src="js/overlay.js"></script>
  <script src="js/segment-info.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
